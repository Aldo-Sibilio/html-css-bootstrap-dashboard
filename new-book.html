<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>bootstrap-dashboard</title>
</head>

<body>
    <!-- Navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="./img/duck.png" alt="Logo" width="40">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Catalogo Libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Anagrafica Utenti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Storico Prestiti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Help</a>
                    </li>
                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search">
                    <button class="btn btn-outline-light" type="submit">Cerca</button>
                </form>
            </div>

        </div>
    </nav>


<main class="container my-4">

  <h1 class="mb-4">Nuovo Libro</h1>

  <form>

    <div class="row g-3">

      <!-- Nome autore -->
      <div class="col-md-6">
        <label class="form-label">Nome Autore</label>
        <input type="text" class="form-control" placeholder="Inserisci il nome dell'autore" required>
      </div>

      <!-- Cognome autore -->
      <div class="col-md-6">
        <label class="form-label">Cognome Autore</label>
        <input type="text" class="form-control" placeholder="Inserisci il cognome dell'autore" required>
      </div>

      <!-- Titolo -->
      <div class="col-12">
        <label class="form-label">Titolo</label>
        <input type="text" class="form-control" placeholder="Inserisci il titolo del libro" required>
        <div class="form-text">Titolo versione italiana</div>
      </div>
    

      <!-- Genere -->
      <div class="col-md-4">
        <label class="form-label">Genere</label>
        <select class="form-select" required>
          <option value="">Scegli il genere</option>
          <option>Fantasy</option>
          <option>Thriller</option>
          <option>Romanzo</option>
          <option>Horror</option>
        </select>
      </div>

      <!-- Anno -->
      <div class="col-md-4">
        <label class="form-label">Anno di Pubblicazione</label>
        <input type="number" class="form-control" placeholder="Inserisci l'anno" required>
      </div>

            <!-- ISBN -->
      <div class="col-md-4">
        <label class="form-label">ISBN#</label>
        <input type="text" class="form-control" placeholder="Inserisci il codice ISBN#" required>
      </div>

    </div>

    <hr class="my-4">

    <!-- Note -->
    <div class="mb-3">
      <label class="form-label">Note</label>
      <textarea class="form-control" rows="4" placeholder="Inserisci eventuali note sul libro"></textarea>
    </div>


    <!-- Checkbox -->
    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" id="digitale">
      <label class="form-check-label" for="digitale">
        Disponibile anche in digitale
      </label>
    </div>

    <!-- Bottone -->
    <button class="btn btn-primary">Aggiungi Libro</button>

  </form>

</main>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
